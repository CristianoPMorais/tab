<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabuleiro 1000 Botões</title>

<style>
body {
    margin:0;
    background-color:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.board {
    display:grid;
    grid-template-columns:repeat(40,1fr);
    gap:0;
    width:95vw;
    max-width:1400px;
}

.cell {
    position:relative;
    width:100%;
    padding-top:100%;
    cursor:pointer;
    border:none;
    outline:none;
    /* Removido transition fixo para não conflitar com a animação */
}

.white { background-color:#ffffff; animation: pulse 1s infinite; }
.black { background-color:#000000; animation: pulse 1s infinite; }

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
}

.label {
    position:absolute;
    bottom:4px;
    left:6px;
    font-size:50%;
    font-weight:bold;
    font-family:Arial;
    pointer-events: none;
}

.white .label { color:black; }
.black .label { color:white; }

.cell:hover {
    opacity: 0.8;
    z-index: 10;
    transform: scale(1.3) !important;
}
</style>
</head>

<body>
<div class="board" id="board"></div>

<script>
const totalButtons = 1000;
const columns = 40;
const board = document.getElementById("board");

for(let i=0; i<totalButtons; i++) {
    const row = Math.floor(i / columns) + 1;
    const col = (i % columns) + 1;

    const button = document.createElement("button");
    button.classList.add("cell");
    
    // Define se é branco ou preto
    button.classList.add((row + col) % 2 === 0 ? "white" : "black");

    // Aleatoriedade: Atraso e Duração
    const delay = Math.random() * 5; // até 5s de atraso
    const duration = 1.5 + Math.random() * 2; // entre 1.5s e 3.5s de velocidade
    button.style.animationDelay = `-${delay}s`;
    button.style.animationDuration = `${duration}s`;

    const label = document.createElement("span");
    label.classList.add("label");
    label.innerText = `${row},${col}`;
    button.appendChild(label);

    button.onclick = function() {
        const links = {
            "1,1":"https://divergencia-armario-pgmn.vercel.app/",
            "1,2":"https://youtube.com",
            "1,3":"https://logoanimada.vercel.app/",
            "1,4":"https://uol.com.br"
        };
        const key = `${row},${col}`;
        if(links[key]) window.location.href = links[key];
        else alert("Nenhum link cadastrado para " + key);
    };

    board.appendChild(button);
}
</script>
</body>
</html>
